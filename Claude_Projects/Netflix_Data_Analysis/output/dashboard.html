
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Data Intelligence Dashboard</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #E50914;
            text-align: center;
            margin-bottom: 40px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .chart-container {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .chart-container img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .chart-title {
            font-size: 1.2em;
            margin-bottom: 10px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Netflix Data Intelligence Dashboard</h1>
    <div class="dashboard-grid">

        <div class="chart-container">
            <div class="chart-title">Top 10 Genres</div>
            <img src="Top 10 Genres.png" alt="Top 10 Genres.png">
        </div>
    
        <div class="chart-container">
            <div class="chart-title">Distribution of Titles by Type</div>
            <img src="Distribution of Titles by Type.png" alt="Distribution of Titles by Type.png">
        </div>
    
        <div class="chart-container">
            <div class="chart-title">Number of Titles Released Each Year</div>
            <img src="Number of Titles Released Each Year.png" alt="Number of Titles Released Each Year.png">
        </div>
    
        <div class="chart-container">
            <div class="chart-title">Top 10 Countries with the Most Titles</div>
            <img src="Top 10 Countries with the Most Titles.png" alt="Top 10 Countries with the Most Titles.png">
        </div>
    
        <div class="chart-container">
            <div class="chart-title">Top 10 Directors</div>
            <img src="Top 10 Directors.png" alt="Top 10 Directors.png">
        </div>
    
        <div class="chart-container">
            <div class="chart-title">Distribution of Movie Durations</div>
            <img src="Distribution of Movie Durations.png" alt="Distribution of Movie Durations.png">
        </div>
    
    </div>
</body>
</html>
